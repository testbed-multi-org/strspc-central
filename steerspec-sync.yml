version: "1.0.0"

auth:
  method: github-token

variables:
  org_name: "testbed-multi-org"

templates:
  - id: claude-md
    version: "1.0.0"
    type: claude-md
    source: templates/CLAUDE.md.mustache
    destination: CLAUDE.md
    strategy: mustache

targets:
  include:
    - "testbed-multi-org/strspc-test-repo-*"
  exclude: []

sync:
  pr-label: steerspec-sync
  dry-run: false
