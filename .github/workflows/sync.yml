name: SteerSpec Sync

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'steerspec-sync.yml'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no PRs created/updated)'
        type: boolean
        default: false
      force:
        description: 'Force sync even if up to date'
        type: boolean
        default: false
      target-filter:
        description: 'Glob to filter target repos'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: SteerSpec/strspc-sync/sync@v1
        with:
          dry-run: ${{ inputs.dry-run || false }}
          force: ${{ inputs.force || false }}
          target-filter: ${{ inputs.target-filter }}
        env:
          GITHUB_TOKEN: ${{ secrets.SYNC_TOKEN }}
